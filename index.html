<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christian | Student Developer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1a1a2e,#000);
}

h1{
font-size:60px;
margin:10px;
}

p{
max-width:600px;
line-height:1.6;
}

button{
padding:15px 30px;
margin-top:20px;
border:none;
border-radius:30px;
background:#5a6cff;
color:white;
font-size:18px;
cursor:pointer;
}

.projects{
padding:80px 20px;
}

.project-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:900px;
margin:auto;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
background:#181818;
}

a{
color:#7ea2ff;
text-decoration:none;
}

footer{
padding:40px;
opacity:0.7;
}
</style>

</head>

<body>

<section class="hero">
<h1>Hey, I'm Christian</h1>
<p>A high school student who loves coding and building websites for fun.</p>
<button onclick="document.querySelector('.projects').scrollIntoView({behavior:'smooth'})">
See My Projects
</button>
</section>

<section class="projects">

<h2>My Projects</h2>

<div class="project-grid">

<div class="card">
<h3>Christian's Calculus Tutor</h3>
<p>A browser-based calculus tool I built.</p>
<a href="https://67christian67.github.io/Christians-Calculus-Tutor/" target="_blank">
Open Project →
</a>
</div>

<div class="card">
<h3>SAT0RU V2</h3>
<p>An anime-themed interactive website project.</p>
<a href="https://67christian67.github.io/SAT0RU_V2/" target="_blank">
Open Project →
</a>
</div>

</div>

</section>

<footer>
<p>Built by Christian • Student Developer</p>
</footer>

</body>
</html>
